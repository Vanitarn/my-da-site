version: 1
indices:
  products:
    target: /products-index.json
    include:
      - /products/**
    exclude:
      - "**/fragments/**"
      - "**/drafts/**"
      - "**/*.json"
    properties:
      name:
        select: div:has(h3#name) + div
        value: textContent(el)
      slug:
        select: div:has(h3#slug) + div
        value: textContent(el)
      tagline:
        select: div:has(h3#tagline) + div
        value: textContent(el)
      category:
        select: div:has(h3#category) + div
        value: textContent(el)
      status:
        select: div:has(h3#status) + div
        value: textContent(el)
      thumbnailUrl:
        select: div:has(h3#thumbnailUrl) + div
        value: textContent(el)
      version:
        select: div:has(h3#version) + div
        value: textContent(el)